<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemonwares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif']
            },
            colors: {
              brand: {
                50: '#f7f7f1',
                100: '#eef0e5',
                500: '#8FBF3F'
              }
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#f7f5ef]">
    <header class="sticky top-0 z-50 bg-[#f7f5ef]">
      <nav class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-24 items-center gap-3">
          <a href="#" class="flex shrink-0 items-center gap-2 sm:gap-3">
            <img
              src="images/lemonLogo.svg"
              alt="Lemonwares logo"
              class="h-10 w-10 object-contain sm:h-12 sm:w-12"
            />
            <span class="text-base font-semibold leading-none tracking-tight text-slate-900 sm:text-xl">Our Services</span>
          </a>

          <div class="hidden flex-1 justify-center md:flex">
            <div class="flex items-center gap-6 lg:gap-8">
              <a href="#" class="text-sm font-semibold text-slate-900">Home</a>
              <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900">About</a>
              <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900">Shop</a>
              <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900">Blog</a>
              <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900">Contact</a>
            </div>
          </div>

          <div class="ml-auto flex items-center gap-3">
            <a
              href="#"
              class="hidden items-center gap-2 rounded-full bg-white px-4 py-2.5 shadow-sm ring-1 ring-slate-200 lg:flex"
            >
              <img src="images/phoneIcon.svg" alt="Phone icon" class="h-4 w-4" />
              <span class="text-sm font-medium whitespace-nowrap text-slate-700">+1 (234) 567-890</span>
            </a>
            <a href="#" class="hidden rounded-full border border-slate-200 p-3 text-slate-700 hover:bg-white xl:flex">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
              </svg>
            </a>
            <a href="#" class="hidden rounded-full border border-slate-200 p-3 text-slate-700 hover:bg-white xl:flex">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4.5 5h15l-1.6 9.4a2 2 0 0 1-2 1.6H8.1a2 2 0 0 1-2-1.6L4.5 5Zm0 0-.7-2.1A1 1 0 0 0 2.8 2H1.5" />
              </svg>
            </a>
            <button
              id="menuButton"
              type="button"
              class="inline-flex items-center justify-center rounded-full border border-slate-200 p-3 text-slate-700 hover:bg-white md:hidden"
              aria-label="Open menu"
              aria-expanded="false"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7h16M4 12h16M4 17h16" />
              </svg>
            </button>
          </div>
        </div>

        <div id="mobileMenu" class="hidden border-t border-slate-200 py-4 md:hidden">
          <div class="flex flex-col gap-3">
            <a href="#" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-900">Home</a>
            <a href="#" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-500">About</a>
            <a href="#" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-500">Shop</a>
            <a href="#" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-500">Blog</a>
            <a href="#" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-500">Contact</a>
          </div>
        </div>
      </nav>
    </header>

    <script src="script.js"></script>
  </body>
</html>
